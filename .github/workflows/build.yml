  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - name: Create test .zip file
        run: |
          mkdir -p pkg/usr/bin pkg/usr/lib pkg/web pkg/models pkg/logs
          echo "test binary for aarch64" > pkg/usr/bin/mnn-server
          echo "test libMNN.so" > pkg/usr/lib/libMNN.so
          echo "test libllm.so" > pkg/usr/lib/libllm.so
          echo "<html>test web UI</html>" > pkg/web/index.html
          touch pkg/models/.git_keep
          touch pkg/logs/.git_keep
          cd pkg && zip -r mnn-llm-server-aarch64.zip usr/
          ls -la

      - name: Create test .deb file
        run: |
          mkdir -p debian/DEBIAN debian/data/data/com.termux/files/usr/bin
          mkdir -p debian/data/data/com.termux/files/usr/lib
          mkdir -p debian/data/data/com.termux/files/usr/share/mnn-llm-server/web
          cp pkg/usr/bin/mnn-server debian/data/data/com.termux/files/usr/bin/mnn-server
          cp pkg/usr/lib/libMNN.so debian/data/data/com.termux/files/usr/lib/
          cp pkg/usr/lib/libllm.so debian/data/data/com.termux/files/usr/lib/
          cp pkg/web/index.html debian/data/data/com.termux/files/usr/share/mnn-llm-server/web/
          cat > debian/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          chmod +x /usr/bin/mnn-server
          exit 0
          EOF
          chmod 755 debian/DEBIAN/postinst
          cat > debian/DEBIAN/control << 'EOF'
          Package: mnn-llm-server
          Version: 0.0.0-test
          Architecture: aarch64
          Maintainer: test
          Description: Test package
          EOF
          dpkg-deb --build debian mnn-llm-server-aarch64.deb
          ls -la *.deb

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mnn-llm-server-aarch64.zip
            mnn-llm-server-aarch64.deb

